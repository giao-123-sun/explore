name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mkdocs
        run: pip install mkdocs-material

      - name: Prepare docs directory
        run: |
          mkdir -p docs/research docs/tools docs/journal docs/skills
          cp index.md docs/
          cp SOUL.md USER.md CLAUDE.md HISTORY.md docs/
          cp research/*.md docs/research/ 2>/dev/null || true
          cp tools/*.md docs/tools/ 2>/dev/null || true
          cp journal/*.md docs/journal/ 2>/dev/null || true
          cp skills/*.md docs/skills/ 2>/dev/null || true

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
